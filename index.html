<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <div class="topbar">
        <h2>Finance AI</h2>
        <button onclick="logout()">Sair</button>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Saldo disponível</h3>
            <div class="value" id="saldo">R$ 0</div>
        </div>

        <div class="card">
            <h3>Gastos</h3>
            <div class="value" id="gastosTotal">R$ 0</div>
        </div>

        <div class="card">
            <h3>Faturas pendentes</h3>
            <div class="value" id="faturasTotal">R$ 0</div>
        </div>


    </div>


    <div class="card">
        <h2>Adicionar receita</h2>
        <select id="tipoReceita">
            <option value="adiantamento">Adiantamento</option>
            <option value="salario">Salário</option>
            <option value="outros">Outros</option>
        </select>
        <input type="number" id="valorReceita" placeholder="Valor">
        <button onclick="addReceita()">Salvar Receita</button>
    </div>

    <div class="card">
        <h2>Adicionar gasto</h2>
        <input type="text" id="descricao" placeholder="Descriçăo">
        <select id="categoria">
            <option>Alimentaçăo</option>
            <option>Transporte</option>
            <option>Saúde</option>
            <option>Educaçăo</option>
            <option>Lazer</option>
            <option>Moradia</option>
            <option>Outros</option>
        </select>
        <input type="number" id="valorGasto" placeholder="Valor">
        <input type="date" id="dataGasto">
        <button onclick="addGasto()">Salvar gasto</button>
    </div>

    <div class="card">
        <h2>Importar CSV</h2>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="importCSV()">Importar CSV</button>
    </div>

    <div class="card">
        <h2>Adicionar Fatura</h2>
        <input type="text" id="fatNome" placeholder="Nome da fatura">
        <input type="number" id="fatValor" placeholder="Valor">
        <input type="number" id="fatVenc" placeholder="Dia vencimento">
        <input type="number" id="fatFech" placeholder="Dia fechamento">
        <button onclick="addFatura()">Salvar Fatura</button>
    </div>

    <div class="card">
        <h2>IA Financeira</h2>
        <div id="iaResposta" class="alert"></div>
        <button onclick="analisarFinancas()">Analisar finanças</button>
    </div>

    <div class="card">
        <h2>Gráfico de Gastos</h2>
        <canvas id="grafico"></canvas>
    </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/csv.js"></script>
<script src="js/ai.js"></script>

</body>
</html>
